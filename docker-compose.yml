services:
  api:
    build:
      context: ./backend/AmrFleet.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"

  ui:
    build:
      context: ./frontend/amr-fleet-ui
    depends_on:
      - api
    ports:
      - "4200:80"
