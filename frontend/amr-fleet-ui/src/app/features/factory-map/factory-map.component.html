<section class="map-panel">
  <div class="panel-heading">
    <h2>Factory Map</h2>
    <span>SVG live telemetry</span>
  </div>

  <svg viewBox="0 0 100 100" role="img" aria-label="Factory floor AMR map">
    <rect class="boundary" x="2" y="2" width="96" height="96" rx="2" />
    <rect class="zone line-a" x="8" y="10" width="28" height="18" />
    <text x="12" y="20">Line A</text>
    <rect class="zone line-b" x="8" y="36" width="28" height="18" />
    <text x="12" y="46">Line B</text>
    <rect class="zone warehouse" x="62" y="18" width="26" height="36" />
    <text x="65" y="36">Warehouse</text>
    <rect class="zone charge" x="6" y="72" width="18" height="16" />
    <text x="9" y="82">Charge</text>
    <rect class="restricted" x="42" y="14" width="12" height="72" />
    <text x="39" y="91">Restricted</text>

    <line class="route" x1="20" y1="25" x2="82" y2="38" />
    <g class="obstacle">
      <circle cx="74" cy="45" r="3" />
      <text x="78" y="47">Obstacle</text>
    </g>

    <g
      *ngFor="let robot of robots"
      class="robot"
      [class.selected]="robot.robotId === selectedRobotId"
      [attr.transform]="'translate(' + robot.x + ' ' + robot.y + ')'"
      (click)="robotSelected.emit(robot)"
    >
      <circle r="3.4" [attr.fill]="color(robot)" />
      <line
        x1="0"
        y1="0"
        x2="0"
        y2="-6"
        [attr.transform]="'rotate(' + robot.heading + ')'"
      />
      <text x="4.5" y="1.5">{{ robot.robotName }}</text>
    </g>
  </svg>
</section>
