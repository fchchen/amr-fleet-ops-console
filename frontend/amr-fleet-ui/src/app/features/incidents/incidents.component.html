<section class="panel">
  <div class="panel-heading">
    <h2>Incidents</h2>
    <span>{{ incidents.length }} active</span>
  </div>

  <article class="incident" *ngFor="let incident of incidents">
    <div>
      <strong>{{ incident.title }}</strong>
      <p>{{ incident.description }}</p>
      <span>{{ incident.robotId }} · {{ incident.status }}</span>
    </div>
    <button
      *ngIf="incident.status === 'Open'"
      type="button"
      class="secondary"
      [disabled]="acknowledgingIncidentId === incident.id"
      (click)="acknowledge(incident)"
    >
      {{ acknowledgingIncidentId === incident.id ? 'Acknowledging' : 'Acknowledge' }}
    </button>
  </article>

  <p class="empty" *ngIf="loading">Loading incidents...</p>
  <p class="empty" *ngIf="!loading && incidents.length === 0">No open or acknowledged incidents.</p>
</section>
